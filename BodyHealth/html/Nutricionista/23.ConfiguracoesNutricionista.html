<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - Nutricionista - Body Health App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        /* COPIE E COLE AQUI TODO O CONTEÚDO DO SEU BLOCO <style> DA personal_configuracoes.html */
        :root {
            /* Cores para o tema escuro - Consistente em todo o site */
            --dark-bg: #1a1a1a; /* Fundo principal muito escuro */
            --dark-card-bg: #2b2b2b; /* Fundo dos cards e sidebar */
            --dark-text-color: #e0e0e0; /* Cor de texto padrão clara (quase branca) */
            --dark-muted-text: #b0b0b0; /* Texto muted mais claro */
            --dark-border-color: #444444; /* Bordas mais escuras */
            --dark-shadow-color: rgba(0,0,0,0.5); /* Sombra mais intensa */
            --highlight-yellow: #ffc107; /* Amarelo de destaque */
            --highlight-green: #28a745; /* Verde para checks */
            --highlight-red: #dc3545; /* Vermelho para X */
            --sidebar-width: 250px; /* Largura da sidebar */
        }

        body {
            background-color: var(--dark-bg);
            color: var(--dark-text-color);
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex; /* Para layout de sidebar e conteúdo */
            min-height: 100vh; /* Ocupa a altura total da viewport */
            overflow-x: hidden; /* Evita scroll horizontal em mobile com sidebar */
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--dark-card-bg);
            padding: 20px;
            box-shadow: 2px 0 10px var(--dark-shadow-color);
            flex-shrink: 0; /* Não permite que a sidebar encolha */
            transition: transform 0.3s ease-in-out; /* Animação de esconder/mostrar */
            position: fixed; /* Fixa a sidebar na tela */
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1030; /* Acima do conteúdo principal, mas abaixo do navbar toggle */
            display: flex;
            flex-direction: column;
        }

        /* Esconder sidebar em mobile por padrão */
        @media (max-width: 991.98px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.show {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0 !important; /* Em mobile, conteúdo não tem margem */
            }
            .navbar-toggler-sidebar {
                display: block !important; /* Mostra o botão de toggle da sidebar */
                position: fixed;
                top: 15px;
                left: 15px;
                z-index: 1040; /* Acima da sidebar */
                color: var(--dark-text-color);
                border: 1px solid var(--dark-border-color);
                background-color: var(--dark-card-bg);
            }
        }

        /* Overlay para mobile quando sidebar está aberta */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 1029; /* Abaixo da sidebar */
        }
        .sidebar.show + .overlay {
            display: block;
        }


        .sidebar .navbar-brand-app {
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 30px;
            text-decoration: none;
            display: flex;
            align-items: center;
        }
        .sidebar .navbar-brand-app img {
            height: 40px;
            margin-right: 10px;
        }
        .sidebar .nav-link {
            color: var(--dark-text-color);
            padding: 10px 15px;
            margin-bottom: 5px;
            border-radius: 5px;
            transition: background-color 0.2s ease, color 0.2s ease;
            display: flex;
            align-items: center;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            background-color: var(--highlight-yellow);
            color: #212529; /* Texto escuro no link ativo */
        }
        .sidebar .nav-link i {
            margin-right: 10px;
            font-size: 1.2rem;
        }
        .sidebar .logout-link {
            margin-top: auto; /* Empurra o logout para o final da sidebar */
            border-top: 1px solid var(--dark-border-color);
            padding-top: 20px;
            text-align: center;
        }

        /* Conteúdo Principal */
        .main-content {
            flex-grow: 1; /* Ocupa o restante do espaço */
            margin-left: var(--sidebar-width); /* Espaço para a sidebar */
            padding: 30px;
            transition: margin-left 0.3s ease-in-out;
        }
        @media (max-width: 991.98px) {
            .main-content {
                margin-left: 0; /* Em mobile, não há margem fixa */
            }
        }

        h1, h2, h3, h4, h5 {
            color: var(--dark-text-color);
        }
        .app-card {
            background-color: var(--dark-card-bg);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 0 10px var(--dark-shadow-color);
            margin-bottom: 25px;
        }
        .app-card h5 {
            color: var(--highlight-yellow);
            margin-bottom: 15px;
        }
        .btn-app {
            background-color: var(--highlight-yellow);
            color: #212529;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        .btn-app:hover {
            background-color: #e6b000;
            color: #212529;
        }
        .form-label {
            color: var(--dark-text-color);
        }
        .form-control, .form-select, .form-check-input {
            background-color: #3b3b3b;
            color: var(--dark-text-color);
            border: 1px solid var(--dark-border-color);
        }
        .form-control::placeholder, .form-select option {
            color: var(--dark-muted-text);
        }
        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 0 0.25rem rgba(255,193,7,0.25);
            border-color: var(--highlight-yellow);
        }
        .form-check-input:checked {
            background-color: var(--highlight-yellow);
            border-color: var(--highlight-yellow);
        }
        .form-check-label {
            color: var(--dark-text-color);
        }
        .profile-picture-upload {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: #3b3b3b;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--dark-muted-text);
            font-size: 3rem;
            cursor: pointer;
            overflow: hidden;
            border: 2px dashed var(--dark-border-color);
            margin-bottom: 15px;
            position: relative;
        }
        .profile-picture-upload img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        .profile-picture-upload input[type="file"] {
            display: none;
        }
        .profile-picture-upload:hover {
            border-color: var(--highlight-yellow);
        }
    </style>
</head>
<body>

    <div class="sidebar" id="appSidebar">
        <a class="navbar-brand-app" href="19.DashboardNutricionista.html">
            <img src="DeWatermark.ai_1747155996253.png" alt="Body Health Logo"> Nutricionista
        </a>
        <nav class="nav flex-column">
            <a class="nav-link" href="19.DashboardNutricionista.html">
                <i class="bi bi-bar-chart-fill"></i> Dashboard
            </a>
            <a class="nav-link" href="20.NutricionistaPacientes.html">
                <i class="bi bi-people-fill"></i> Meus Pacientes
            </a>
            <a class="nav-link" href="21.GerenciarDietasNutricionista.html">
                <i class="bi bi-egg-fried"></i> Gerenciar Dietas
            </a>
            <a class="nav-link" href="22.MensagensNutricionista.html">
                <i class="bi bi-chat-dots-fill"></i> Mensagens
            </a>
            <a class="nav-link active" aria-current="page" href="23.ConfiguracoesNutricionista.html">
                <i class="bi bi-gear-fill"></i> Configurações
            </a>
        </nav>
        <div class="logout-link">
            <a class="nav-link text-danger" href="/html/Inicio/2.Login.html">
                <i class="bi bi-box-arrow-right"></i> Sair
            </a>
        </div>
    </div>

    <div class="overlay" id="sidebarOverlay"></div>

    <button class="btn btn-sm navbar-toggler-sidebar d-lg-none" type="button" id="sidebarToggle">
        <span class="bi bi-list"></span>
    </button>

    <div class="main-content">
        <h1 class="mb-4 fw-bold">Configurações</h1>

        <div class="app-card">
            <h5>Informações do Perfil</h5>
            <form>
                <div class="mb-3 text-center">
                    <label for="profilePicture" class="form-label d-block mb-3">Foto de Perfil</label>
                    <div class="profile-picture-upload mx-auto" onclick="document.getElementById('profilePicture').click()">
                        <img id="previewProfilePicture" src="" alt="Prévia da Foto de Perfil" style="display:none;">
                        <i class="bi bi-camera" id="cameraIcon"></i>
                        <input type="file" id="profilePicture" accept="image/*">
                    </div>
                </div>
                <div class="mb-3">
                    <label for="nomeCompleto" class="form-label">Nome Completo</label>
                    <input type="text" class="form-control" id="nomeCompleto" value="Ana Nutri Souza" required>
                </div>
                <div class="mb-3">
                    <label for="emailNutri" class="form-label">E-mail</label>
                    <input type="email" class="form-control" id="emailNutri" value="ana.nutri@bodyhealth.com" disabled>
                </div>
                <div class="mb-3">
                    <label for="telefoneNutri" class="form-label">Telefone</label>
                    <input type="tel" class="form-control" id="telefoneNutri" value="(XX) XXXXX-XXXX">
                </div>
                <div class="mb-3">
                    <label for="crnNutri" class="form-label">CRN</label>
                    <input type="text" class="form-control" id="crnNutri" value="12345-BA" required>
                </div>
                <div class="mb-3">
                    <label for="bioNutri" class="form-label">Sobre Mim (Bio)</label>
                    <textarea class="form-control" id="bioNutri" rows="4">Nutricionista apaixonada por ajudar pessoas a transformarem sua relação com a comida e alcançarem uma vida mais saudável.</textarea>
                </div>
                <button type="submit" class="btn btn-app"><i class="bi bi-save me-2"></i> Salvar Alterações</button>
            </form>
        </div>

        <div class="app-card">
            <h5>Configurações de Notificações</h5>
            <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" id="notifNovosPacientes" checked>
                <label class="form-check-label" for="notifNovosPacientes">Receber notificação de novos pacientes</label>
            </div>
            <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" id="notifDietaAceita" checked>
                <label class="form-check-label" for="notifDietaAceita">Notificar quando um paciente aceitar a dieta</label>
            </div>
            <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" id="notifNovasMensagens">
                <label class="form-check-label" for="notifNovasMensagens">Notificar novas mensagens</label>
            </div>
            <button class="btn btn-outline-warning mt-3">Salvar Preferências</button>
        </div>

        <div class="app-card">
            <h5>Segurança da Conta</h5>
            <button class="btn btn-outline-warning mb-2"><i class="bi bi-key-fill me-2"></i> Alterar Senha</button>
            <button class="btn btn-outline-danger"><i class="bi bi-person-x-fill me-2"></i> Desativar Conta</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // JavaScript para o toggle da sidebar em mobile
        document.addEventListener('DOMContentLoaded', function() {
            const sidebar = document.getElementById('appSidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            const overlay = document.getElementById('sidebarOverlay');

            if (toggleBtn) {
                toggleBtn.addEventListener('click', function() {
                    sidebar.classList.toggle('show');
                    overlay.classList.toggle('show');
                });
            }

            if (overlay) {
                overlay.addEventListener('click', function() {
                    sidebar.classList.remove('show');
                    overlay.classList.remove('show');
                });
            }

            window.addEventListener('resize', function() {
                if (window.innerWidth >= 992) {
                    sidebar.classList.remove('show');
                    overlay.classList.remove('show');
                }
            });

            // Lógica para pré-visualizar a imagem de perfil
            const profilePictureInput = document.getElementById('profilePicture');
            const previewProfilePicture = document.getElementById('previewProfilePicture');
            const cameraIcon = document.getElementById('cameraIcon');

            profilePictureInput.addEventListener('change', function(event) {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        previewProfilePicture.src = e.target.result;
                        previewProfilePicture.style.display = 'block';
                        cameraIcon.style.display = 'none'; // Esconde o ícone da câmera
                    }
                    reader.readAsDataURL(file);
                } else {
                    previewProfilePicture.src = '';
                    previewProfilePicture.style.display = 'none';
                    cameraIcon.style.display = 'block'; // Mostra o ícone da câmera novamente
                }
            });
        });
    </script>
</body>
</html>
